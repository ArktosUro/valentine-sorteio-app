<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Dia dos Namorados</title>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>💖 Sorteio Dias dos Namorados 💖</h1>
      <p class="subtitle">Boa sorte! 🎉🎉</p>

      <h2 id="slot">🎰</h2>

      <form id="my-form">
        <input type="text" id="input-name" placeholder="Inserir nome" required>
        <input type="number" id="input-number" min="1" max="100" placeholder="Inserir número" required>
        <button type="submit">Submit</button>
        <button type="button" onclick="spinReel()">Spin 🎰</button>

        <p id="result"></p>
      </form>

      <div class="copyright">
        JUSRIGH ©
      </div>
    </div>
  </div>

</body>
<script src="index.js"></script>

</html>
